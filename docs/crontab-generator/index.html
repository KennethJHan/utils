<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Crontab Generator — utils</title>
    <link rel="stylesheet" href="../common.css" />
  </head>
  <body>
    <div class="page">
      <a class="back" href="../">← 목록</a>
      <h1>Crontab Generator</h1>
      <p class="lead">
        분, 시, 일, 월, 주 필드와 커맨드를 입력하면 바로 crontab 한 줄을 만듭니다.
      </p>

      <form class="form" id="form" novalidate>
        <div class="field">
          <label for="minutePreset">분 (Minute)</label>
          <select id="minutePreset">
            <option value="*">매 분 (*)</option>
            <option value="*/5">5분마다 (*/5)</option>
            <option value="*/10">10분마다 (*/10)</option>
            <option value="*/15">15분마다 (*/15)</option>
            <option value="0">매시 정각 (0)</option>
            <option value="custom">직접 입력</option>
          </select>
          <input id="minuteCustom" type="text" autocomplete="off" placeholder="예: 0,15,30,45" hidden />
        </div>

        <div class="field">
          <label for="hourPreset">시 (Hour)</label>
          <select id="hourPreset">
            <option value="*">매시 (*)</option>
            <option value="*/2">2시간마다 (*/2)</option>
            <option value="*/6">6시간마다 (*/6)</option>
            <option value="*/12">12시간마다 (*/12)</option>
            <option value="0">매일 자정 (0)</option>
            <option value="custom">직접 입력</option>
          </select>
          <input id="hourCustom" type="text" autocomplete="off" placeholder="예: 9-18/3" hidden />
        </div>

        <div class="field">
          <label for="domPreset">일 (Day of Month)</label>
          <select id="domPreset">
            <option value="*">매일 (*)</option>
            <option value="1">매월 1일 (1)</option>
            <option value="15">매월 15일 (15)</option>
            <option value="1,15">매월 1일/15일 (1,15)</option>
            <option value="*/2">이틀마다 (*/2)</option>
            <option value="custom">직접 입력</option>
          </select>
          <input id="domCustom" type="text" autocomplete="off" placeholder="예: 1-10" hidden />
        </div>

        <div class="field">
          <label for="monthPreset">월 (Month)</label>
          <select id="monthPreset">
            <option value="*">매월 (*)</option>
            <option value="1">1월 (1)</option>
            <option value="1,4,7,10">분기 시작월 (1,4,7,10)</option>
            <option value="1,7">반기 (1,7)</option>
            <option value="12">12월 (12)</option>
            <option value="custom">직접 입력</option>
          </select>
          <input id="monthCustom" type="text" autocomplete="off" placeholder="예: 3-11/2" hidden />
        </div>

        <div class="field">
          <label for="dowPreset">주 (Day of Week)</label>
          <select id="dowPreset">
            <option value="*">매일 (*)</option>
            <option value="1-5">평일 (1-5)</option>
            <option value="0,6">주말 (0,6)</option>
            <option value="1">매주 월요일 (1)</option>
            <option value="0">매주 일요일 (0)</option>
            <option value="custom">직접 입력</option>
          </select>
          <input id="dowCustom" type="text" autocomplete="off" placeholder="예: 1,3,5" hidden />
        </div>

        <div class="field">
          <label for="command">실행 커맨드</label>
          <input
            id="command"
            type="text"
            autocomplete="off"
            placeholder='예: /usr/bin/php /home/user/app/cron.php'
          />
          <p class="hint">커맨드는 비워둘 수 없습니다.</p>
        </div>

        <button type="submit" class="primary">crontab 생성</button>
      </form>

      <p id="error" class="error" hidden></p>
      <p id="result" class="result" hidden></p>
      <p id="resultMeta" class="result-meta" hidden></p>

      <div class="help">
        <strong>필드 순서</strong>
        <ul>
          <li>분 시 일 월 주 커맨드</li>
          <li>예: <code>*/15 9-18 * * 1-5 /path/to/script.sh</code></li>
          <li>직접 입력 시 숫자, <code>*</code>, <code>/</code>, <code>,</code>, <code>-</code> 만 허용됩니다.</li>
        </ul>
      </div>
    </div>

    <script>
      (function () {
        var FIELD_KEYS = ["minute", "hour", "dom", "month", "dow"];
        var FIELD_RE = /^[\d*\/,\-]+$/;

        function byId(id) {
          return document.getElementById(id);
        }

        function setupField(key) {
          var preset = byId(key + "Preset");
          var custom = byId(key + "Custom");

          function sync() {
            var useCustom = preset.value === "custom";
            custom.hidden = !useCustom;
            if (useCustom) {
              custom.focus();
            } else {
              custom.value = "";
            }
          }

          preset.addEventListener("change", sync);
          sync();
        }

        function readField(key) {
          var preset = byId(key + "Preset").value;
          var custom = byId(key + "Custom").value.trim();
          if (preset !== "custom") return preset;
          return custom;
        }

        function showError(msg) {
          byId("error").textContent = msg;
          byId("error").hidden = false;
          byId("result").hidden = true;
          byId("resultMeta").hidden = true;
        }

        function showResult(line) {
          byId("error").hidden = true;
          byId("result").textContent = line;
          byId("result").hidden = false;
          byId("resultMeta").textContent = "crontab -e 에 붙여 넣어 사용하세요.";
          byId("resultMeta").hidden = false;
        }

        function validateFieldValue(name, value) {
          if (!value) return name + " 값을 입력하세요.";
          if (!FIELD_RE.test(value)) {
            return (
              name +
              " 값에는 숫자, *, /, ,, - 만 사용할 수 있습니다."
            );
          }
          return "";
        }

        FIELD_KEYS.forEach(setupField);

        byId("form").addEventListener("submit", function (e) {
          e.preventDefault();

          var values = FIELD_KEYS.map(readField);
          var labels = ["분", "시", "일", "월", "주"];
          for (var i = 0; i < values.length; i += 1) {
            var err = validateFieldValue(labels[i], values[i]);
            if (err) {
              showError(err);
              return;
            }
          }

          var command = byId("command").value.trim();
          if (!command) {
            showError("실행 커맨드를 입력하세요.");
            return;
          }

          var cronLine = values.join(" ") + " " + command;
          showResult(cronLine);
        });
      })();
    </script>
  </body>
</html>
